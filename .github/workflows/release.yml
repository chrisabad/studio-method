name: Create Version Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vivliostyle
        run: npm install -g @vivliostyle/cli

      - name: Generate PDF
        run: vivliostyle build ebook/playbook.html -o public/guide.pdf --size "7in,9in"

      - name: Get tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release with PDF
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Studio Method Playbook ${{ steps.tag.outputs.tag }}
          body: |
            ## Studio Method: The Creative Director's AI Playbook

            **Version:** ${{ steps.tag.outputs.tag }}

            Download the PDF below — it includes all 7 chapters, appendices, and the prompt library.

            > To create a new release: `git tag v1.x && git push origin v1.x`
          files: |
            public/guide.pdf
          draft: false
          prerelease: false
