name: Create Version Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vivliostyle
        run: npm install -g @vivliostyle/cli

      - name: Get tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Inject version into HTML
        run: sed -i "s/{{VERSION}}/${{ steps.tag.outputs.tag }}/g" ebook/playbook.html

      - name: Generate PDF
        run: |
          vivliostyle build ebook/playbook.html -o "public/playbook-${{ steps.tag.outputs.tag }}.pdf" --size "7in,9in"
          cp "public/playbook-${{ steps.tag.outputs.tag }}.pdf" "public/playbook.pdf"

      - name: Configure AWS CLI for R2
        run: |
          aws configure set aws_access_key_id ${{ secrets.R2_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.R2_SECRET_ACCESS_KEY }}
          aws configure set default.region auto

      - name: Upload PDF to Cloudflare R2
        run: |
          aws s3 cp "public/playbook-${{ steps.tag.outputs.tag }}.pdf" \
            "s3://${{ secrets.R2_BUCKET }}/studio-method/playbook-${{ steps.tag.outputs.tag }}.pdf" \
            --endpoint-url ${{ secrets.R2_ENDPOINT }}
          echo "Uploaded to R2: studio-method/playbook-${{ steps.tag.outputs.tag }}.pdf"

      - name: Create GitHub Release with PDF
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Studio Method Playbook ${{ steps.tag.outputs.tag }}
          body: |
            ## Studio Method: The Creative Director's AI Playbook

            **Version:** ${{ steps.tag.outputs.tag }}

            Download the PDF below — it includes all 7 chapters, appendices, and the prompt library.

            > To create a new release: `git tag v1.x && git push origin v1.x`
          files: |
            public/playbook-${{ steps.tag.outputs.tag }}.pdf
            public/playbook.pdf
          draft: false
          prerelease: false
