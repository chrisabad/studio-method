name: Compile Ebook PDF

on:
  push:
    branches: [main]
    paths:
      - 'ebook/playbook.md'
      - 'ebook/playbook.html'
      - 'ebook/template.html'
      - 'ebook/build.js'
      - '.github/workflows/compile-ebook.yml'
  workflow_dispatch:

jobs:
  compile-pdf:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vivliostyle
        run: npm install -g @vivliostyle/cli

      - name: Inject version into HTML
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "dev")
          sed -i "s/{{VERSION}}/$VERSION/g" ebook/playbook.html

      - name: Build HTML from Markdown
        run: node ebook/build.js

      - name: Generate PDF
        run: |
          vivliostyle build ebook/playbook.html -o public/guide.pdf --size "7in,9in"

      - name: Commit PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/guide.pdf
          git diff --staged --quiet || git commit -m "chore: auto-compile ebook PDF [skip ci]"
          git push
