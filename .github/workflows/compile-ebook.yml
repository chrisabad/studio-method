name: Compile Ebook PDF

on:
  push:
    branches: [main]
    paths:
      - 'ebook/playbook.html'
      - '.github/workflows/compile-ebook.yml'

jobs:
  compile-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Generate PDF
        run: |
          node - << 'EOF'
          const puppeteer = require('puppeteer');
          const path = require('path');
          const fs = require('fs');

          (async () => {
            const browser = await puppeteer.launch({
              args: ['--no-sandbox', '--disable-setuid-sandbox']
            });
            const page = await browser.newPage();

            const filePath = path.resolve('ebook/playbook.html');
            await page.goto(`file://${filePath}`, { waitUntil: 'networkidle0' });

            await page.pdf({
              path: 'ebook/playbook.pdf',
              format: 'Letter',
              printBackground: true,
              margin: { top: '0.5in', bottom: '0.5in', left: '0', right: '0.5in' }
            });

            await browser.close();
            console.log('PDF generated: ebook/playbook.pdf');

            // Copy to public/
            fs.copyFileSync('ebook/playbook.pdf', 'public/guide.pdf');
            console.log('Copied to: public/guide.pdf');
          })();
          EOF

      - name: Commit PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ebook/playbook.pdf public/guide.pdf
          git diff --staged --quiet || git commit -m "chore: auto-compile ebook PDF [skip ci]"
          git push
