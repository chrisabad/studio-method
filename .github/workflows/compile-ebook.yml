name: Compile Ebook PDF

on:
  push:
    branches: [main]
    paths:
      - 'ebook/playbook.html'
      - '.github/workflows/compile-ebook.yml'
  workflow_dispatch:

jobs:
  compile-pdf:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vivliostyle
        run: npm install -g @vivliostyle/cli

      - name: Generate PDF
        run: |
          vivliostyle build ebook/playbook.html -o ebook/playbook.pdf --size "7in,9in"
          cp ebook/playbook.pdf public/guide.pdf

      - name: Commit PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ebook/playbook.pdf public/guide.pdf
          git diff --staged --quiet || git commit -m "chore: auto-compile ebook PDF [skip ci]"
          git push
